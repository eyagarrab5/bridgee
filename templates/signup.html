<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Bridge Health Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0A2540;
            --secondary: #00A896;
            --gradient-primary: linear-gradient(135deg, #0A2540 0%, #1B4F6E 100%);
            --gradient-secondary: linear-gradient(135deg, #00A896 0%, #00C896 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        
        .hero {
            background: var(--gradient-primary);
            padding: 60px 30px;
            text-align: center;
            color: white;
            border-radius: 24px 24px 0 0;
            margin-bottom: 0;
        }
        
        .hero-logo { font-size: 2.5rem; font-weight: 800; }
        .hero-logo span { color: var(--secondary); }
        .hero-tagline { font-size: 1.2rem; margin-top: 10px; opacity: 0.9; }
        
        .form-wrapper {
            background: white;
            border-radius: 0 0 24px 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }
        
        .form-control {
            border-radius: 12px;
            border: 1.5px solid #e5e7eb;
            padding: 14px 16px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0,168,150,0.1);
            outline: none;
        }
        
        .btn-submit {
            background: var(--gradient-secondary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,168,150,0.3);
        }
        
        .text-center { text-align: center; }
        .mt-3 { margin-top: 20px; }
        
        .text-center a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .text-center a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .hero-logo { font-size: 1.8rem; }
            .hero-tagline { font-size: 1rem; }
            .hero { padding: 40px 20px; }
            .form-wrapper { padding: 30px 20px; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="hero">
        <div class="hero-logo">INSCRIPTION</div>
        <div class="hero-tagline">Rejoignez la communauté Bridge Health</div>
    </div>
    
    <div class="form-wrapper">
        <div class="section-title">
            <i class="fas fa-user-plus"></i>
            Créer un compte
        </div>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label" style="display: block; margin-bottom: 8px; font-weight: 500;">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" required placeholder="Choisissez un pseudo">
            </div>
            <div class="mb-3">
                <label class="form-label" style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                <input type="email" name="email" class="form-control" required placeholder="votre@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label" style="display: block; margin-bottom: 8px; font-weight: 500;">Mot de passe</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label" style="display: block; margin-bottom: 8px; font-weight: 500;">Confirmer le mot de passe</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">S'inscrire</button>
        </form>
        
        <div class="text-center mt-3">
            <p>Déjà inscrit ? <a href="/login">Se connecter</a></p>
        </div>
    </div>
</div>

</body>
</html>
