<!DOCTYPE html>
<html lang="fr">
<head>

    p  { font-size: 14px; color: #94A3B8; margin-bottom: 24px; }
    a  { background: #0A2540; color: white; padding: 11px 24px; border-radius: 8px; font-weight: 600; font-size: 13px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">500</div>
    <h1>Erreur serveur</h1>
